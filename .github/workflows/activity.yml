name: Daily public activity (24h) → Pages (TOML + 7d)

on:
  # Dual crons to cover DST; script guards to only emit at 5 PM America/New_York
#  schedule:
#    - cron: "5 21 * * *"  # 5:05 PM EDT (UTC-4)
#    - cron: "5 22 * * *"  # 5:05 PM EST (UTC-5)
  workflow_dispatch:
    inputs:
      force:
        description: "Run regardless of local-time guard (for testing)"
        type: boolean
        default: false
      hours:
        description: "Lookback window in hours"
        type: number
        default: 24

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false



      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Generate activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: "matthewdeanmartin"
          # CSS is now handled in the python script by default,
          # but can still be overridden here by setting INLINE_CSS
          FORCE_RUN: ${{ inputs.force }}
          WINDOW_HOURS: ${{ inputs.hours }}
        run: python generate_activity.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
